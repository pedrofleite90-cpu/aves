<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Optimización clave para evitar zoom molesto en celulares -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Alas de Chile 🐦</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet.js (Mapas) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cielo: '#D6EAF8', lago: '#2980B9', bosque: '#1E8449',
            hoja: '#A9DFBF', tierra: '#784212', sol: '#F7DC6F',
            coral: '#E74C3C', niebla: '#F0F4F8', pizarra: '#2C3E50',
          },
          fontFamily: { display: ['Nunito', 'sans-serif'], prose: ['Lora', 'serif'] }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #F0F4F8; -webkit-tap-highlight-color: transparent; }
    
    /* Pines del mapa */
    .ave-pin {
      width: 38px; height: 38px; border-radius: 50% 50% 50% 0;
      position: absolute; transform: rotate(-45deg);
      border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .ave-pin-emoji { transform: rotate(45deg); font-size: 19px; }

    /* Modos de tarjetas */
    .tab-panel { display: none; }
    .tab-panel.activo { display: block; }

    /* Estructura del carrusel dinámico para iNaturalist */
    .car-container { position: relative; width: 100%; height: 100%; overflow: hidden; background: #2C3E50; }
    .car-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.4s ease-in-out; }
    .car-slide.activo { opacity: 1; z-index: 10; }
    .car-slide img { width: 100%; height: 100%; object-fit: cover; }

    .car-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
    .car-dot.activo { background: #FFFFFF; transform: scale(1.2); }
  </style>
</head>
<body class="text-pizarra min-h-screen flex flex-col antialiased">

  <!-- CABECERA -->
  <header class="bg-lago text-white py-3 px-4 shadow-md sticky top-0 z-[1000] flex justify-between items-center">
    <div>
      <h1 class="font-black text-lg sm:text-xl tracking-tight flex items-center gap-2">Alas de Chile 🐦</h1>
      <p id="contador-aves" class="text-xs text-cielo font-semibold">Cargando enciclopedia...</p>
    </div>

    <!-- Botón / Switch de Modo (Fácil de tocar en celular) -->
    <button onclick="toggleModo()" class="bg-black/20 hover:bg-black/30 active:scale-95 transition-all px-3 py-1.5 rounded-full text-xs font-black text-white flex items-center gap-2">
      <span id="label-modo">Modo Adulto 📊</span>
    </button>
  </header>

  <!-- CONTENEDOR PRINCIPAL: Responsive Grid (1 columna en móvil, 2 en PC grande) -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-3 sm:p-4 grid grid-cols-1 lg:grid-cols-12 gap-4">

    <!-- COLUNA IZQUIERDA (MAPA Y FILTROS) - Toma 7 columnas en PC -->
    <div class="lg:col-span-7 flex flex-col gap-4">
      
      <!-- Bloque del Filtro por Zonas -->
      <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
        <label for="filtro-zona" class="text-xs font-black text-pizarra flex items-center gap-1">
          📍 Filtrar aves por ecosistema:
        </label>
        <select id="filtro-zona" onchange="filtrarPorZona(this.value)" class="text-sm font-bold text-pizarra bg-gray-50 border border-gray-200 rounded-xl p-2 outline-none cursor-pointer focus:border-lago w-full sm:w-auto">
          <option value="Todas">🇨🇱 Todo Chile (54 aves)</option>
          <option value="Norte">🌵 Zona Norte</option>
          <option value="Centro">🏙️ Zona Centro</option>
          <option value="Sur">🌲 Zona Sur</option>
          <option value="Centro-Sur">🐄 Zona Centro-Sur</option>
          <option value="Norte-Centro">🌊 Zona Norte-Centro</option>
          <option value="Norte-Centro-Sur">🎒 Zona Multiregional</option>
          <option value="Islas">🏝️ Territorio Insular</option>
        </select>
      </div>

      <!-- Contenedor del Mapa (Se adapta al tamaño de pantalla) -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative flex-1 min-h-[320px] sm:min-h-[400px]">
        <div id="map" class="w-full h-full z-10"></div>
        <button id="btn-ubicacion" onclick="centrarMiUbicacion()" class="absolute bottom-4 right-4 z-[1000] bg-lago text-white w-11 h-11 rounded-full shadow-lg text-lg flex items-center justify-center active:scale-95 transition-transform" title="Mi ubicación">
          📍
        </button>
      </div>
    </div>

    <!-- COLUMNA DERECHA (TARJETA DETALLE Y ÁLBUM) - Toma 5 columnas en PC -->
    <div class="lg:col-span-5 flex flex-col gap-4">
      
      <!-- === TARJETA ADULTO === -->
      <div id="tarjeta-adulto" class="tab-panel activo bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
        <!-- Contenedor de Imagen Altura Fija Inteligente para Celular/PC -->
        <div class="h-56 sm:h-64 relative">
          <!-- VACIADO para recibir las fotos de iNaturalist -->
          <div id="car-adulto" class="car-container"></div>
          
          <!-- Controles táctiles/click del carrusel -->
          <button onclick="carMover(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 z-20 bg-black/30 text-white w-8 h-8 rounded-full font-bold text-xs flex items-center justify-center">◀</button>
          <button onclick="carMover(1)" class="absolute right-2 top-1/2 -translate-y-1/2 z-20 bg-black/30 text-white w-8 h-8 rounded-full font-bold text-xs flex items-center justify-center">▶</button>
          <div id="car-dots-adulto" class="absolute bottom-2 left-1/2 -translate-x-1/2 z-20 flex gap-1"></div>
        </div>

        <!-- Info del ave -->
        <div class="p-4 space-y-3">
          <div class="flex justify-between items-start gap-2 border-b border-gray-100 pb-2">
            <div>
              <h2 class="font-black text-xl text-pizarra flex items-center gap-1.5">
                <span id="adulto-emoji">🐦</span>
                <span id="adulto-nombre">---</span>
              </h2>
              <p id="adulto-cientifico" class="text-xs italic text-gray-400 font-bold mt-0.5">---</p>
            </div>
            <button id="btn-audio-a" onclick="toggleAudio()" class="bg-lago hover:bg-lago/90 text-white text-xs font-black px-3 py-2 rounded-xl transition-colors shrink-0">
              🔊 Canto
            </button>
          </div>

          <!-- Tabs Técnicas -->
          <div>
            <div class="flex gap-3 border-b border-gray-100 text-xs font-black mb-2">
              <button onclick="abrirTab('habitat', this)" class="tab-btn activa border-b-2 border-lago pb-1 text-lago">Hábitat</button>
              <button onclick="abrirTab('conservacion', this)" class="tab-btn border-b-2 border-transparent pb-1 text-gray-400">Conservación</button>
            </div>
            <div id="panel-habitat" class="tab-panel activo text-xs sm:text-sm font-prose text-gray-600 leading-relaxed">
              <p id="adulto-habitat">---</p>
            </div>
            <div id="panel-conservacion" class="tab-panel text-xs sm:text-sm font-prose text-gray-600 leading-relaxed">
              <p id="adulto-conservacion" class="inline-block bg-red-50 text-coral font-bold px-2.5 py-1 rounded-lg">---</p>
            </div>
          </div>
        </div>
      </div>

      <!-- === TARJETA NIÑO === -->
      <div id="tarjeta-nino" class="tab-panel bg-sol/20 rounded-2xl border-4 border-sol overflow-hidden flex flex-col">
        <div class="h-56 sm:h-64 relative">
          <!-- VACIADO para iNaturalist Infantil -->
          <div id="car-nino" class="car-container"></div>
          <div id="car-dots-nino" class="absolute bottom-2 left-1/2 -translate-x-1/2 z-20 flex gap-1"></div>
        </div>
        <div class="p-4 text-center space-y-3">
          <h2 class="font-black text-2xl text-pizarra flex items-center justify-center gap-2">
            <span id="nino-emoji">🐦</span>
            <span id="nino-nombre">---</span>
          </h2>
          <div class="bg-white/90 p-3 rounded-xl border border-sol/40 text-sm font-bold text-pizarra shadow-sm">
            <p id="nino-superpoder">---</p>
          </div>
          <button id="btn-voz-nino" onclick="toggleVoz()" class="bg-coral text-white font-black px-4 py-2.5 rounded-xl text-sm active:scale-95 transition-transform inline-flex items-center gap-1">
            📢 ¡Háblame!
          </button>
        </div>
      </div>

      <!-- === ÁLBUM DE COLECCIÓN === -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 flex flex-col justify-between flex-1">
        <div>
          <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-2">
            <h3 class="font-black text-xs sm:text-sm text-pizarra">📚 Colección</h3>
            <span id="txt-paginacion" class="text-[11px] font-bold text-gray-400">Pág --/--</span>
          </div>
          <!-- Grid dinámico: 3 columnas en celular, 4 o 5 en pantallas más grandes -->
          <div id="album-grid" class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-3 gap-2">
            <!-- Inyectado por JS -->
          </div>
        </div>

        <!-- Botones de navegación del álbum -->
        <div class="flex justify-between items-center pt-3 mt-2 border-t border-gray-50">
          <button id="btn-pag-ant" onclick="cambiarPaginaAlbum(-1)" class="bg-gray-100 text-pizarra text-xs font-black px-3 py-1.5 rounded-lg active:scale-95 transition-transform">◀ Ant</button>
          <button id="btn-pag-sig" onclick="cambiarPaginaAlbum(1)" class="bg-gray-100 text-pizarra text-xs font-black px-3 py-1.5 rounded-lg active:scale-95 transition-transform">Sig ▶</button>
        </div>
      </div>

    </div>
  </main>

  <footer class="bg-pizarra text-white/30 text-center text-[10px] py-3 mt-4 border-t border-white/5 font-semibold">
    Alas de Chile &copy; 2026 &bull; Conectado a iNaturalist API
  </footer>

  <!-- Archivo Lógico Cerebro -->
  <script src="app.js"></script>
</body>
</html>
