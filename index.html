<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alas de Chile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <div id="contador-aves" class="text-sm font-bold">Cargando...</div>
  <div id="map" style="height: 400px;"></div>

  <script>
    // 1. Declaración ÚNICA de variables
    let aves = [];
    let aveActual = null;
    let mapa;
    let modoNino = false; // Declarada solo una vez
    let audioSonando = false;
    let notasTimer;

    // 2. FUNCIÓN DE CARGA DINÁMICA
    async function cargarBaseDeDatos() {
      try {
        const respuesta = await fetch('aves.json?t=' + new Date().getTime());
        if (!respuesta.ok) throw new Error("Archivo no encontrado");
        
        aves = await respuesta.json();
        
        // Actualizar UI
        document.getElementById('contador-aves').textContent = `🐦 ${aves.length} aves`;
        
        // Inicializar
        if (aves.length > 0) {
          aveActual = aves[0];
          initMapa();
          actualizarTarjeta(aveActual);
        }
      } catch (error) {
        console.error("Error al cargar datos:", error);
      }
    }

    // 3. INICIALIZACIÓN DE LA APP
    document.addEventListener('DOMContentLoaded', () => {
      cargarBaseDeDatos();
    });

    // 4. FUNCIONES (Asegúrate de que no estén duplicadas abajo)
    function initMapa() {
      if(mapa) mapa.remove();
      mapa = L.map('map').setView([-35.6751, -71.5430], 5);
      L.tileLayer('https://{tile}.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
      
      aves.forEach(ave => {
        if(ave.coordenadasEjemplo) {
          L.marker(ave.coordenadasEjemplo).addTo(mapa).on('click', () => actualizarTarjeta(ave));
        }
      });
    }

    function actualizarTarjeta(ave) {
      aveActual = ave;
      // Aquí tu lógica de actualizar elementos del HTML
      console.log("Mostrando:", ave.nombreComun);
    }
  </script>
</body>
</html>
