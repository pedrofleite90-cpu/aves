<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Alas de Chile 🐦</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cielo: '#D6EAF8', lago: '#2980B9', bosque: '#1E8449',
            hoja: '#A9DFBF', tierra: '#784212', sol: '#F7DC6F',
            coral: '#E74C3C', niebla: '#F0F4F8', pizarra: '#2C3E50',
          },
          fontFamily: { display: ['Nunito', 'sans-serif'], prose: ['Lora', 'serif'] }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #F0F4F8; }
    
    /* Estilos para los Pines personalizados del mapa */
    .ave-pin {
      width: 38px; height: 38px; border-radius: 50% 50% 50% 0;
      position: absolute; transform: rotate(-45deg);
      border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .ave-pin-emoji { transform: rotate(45deg); font-size: 19px; }

    /* Modos de tarjetas (Adulto/Niño) */
    .tab-panel { display: none; }
    .tab-panel.activo { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Estilos dinámicos para los carruseles controlados por JS */
    .car-container { position: relative; width: 100%; height: 256px; overflow: hidden; background: #2C3E50; }
    .car-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s ease-in-out; display: flex; align-items: center; justify-content: center; }
    .car-slide.activo { opacity: 1; z-index: 10; }
    .car-slide img { width: 100%; height: 100%; object-fit: cover; }

    .car-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.3s; }
    .car-dot.activo { background: #FFFFFF; transform: scale(1.3); }
    
    #car-dots-nino .car-dot.activo { background: #2C3E50; }
    #car-dots-nino .car-dot { background: rgba(0,0,0,0.2); }
  </style>
</head>
<body class="text-pizarra min-h-screen flex flex-col antialiased">

  <header id="app-header" class="bg-lago text-white py-4 px-4 shadow-md sticky top-0 z-[1000] flex justify-between items-center">
    <div>
      <h1 class="font-black text-xl tracking-tight flex items-center gap-2">Alas de Chile 🐦</h1>
      <p id="contador-aves" class="text-xs text-cielo font-semibold">🐦 Cargando enciclopedia...</p>
    </div>

    <div class="flex items-center gap-2 bg-black/20 p-1.5 rounded-full cursor-pointer select-none" onclick="toggleModo()">
      <span id="label-modo" class="text-xs font-black px-2 text-cielo">Adulto 📊</span>
      <div class="w-14 h-6 bg-white/30 rounded-full p-0.5 relative transition-colors duration-300">
        <div id="switch-thumb" class="w-5 h-5 bg-white rounded-full shadow-md transition-transform duration-300 absolute left-0.5 top-0.5"></div>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-5xl w-full mx-auto p-4 space-y-4">

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">
      
      <div class="absolute top-3 left-12 z-[1000] right-3 sm:right-auto bg-white/95 backdrop-blur-sm px-3 py-2 rounded-xl shadow-md border border-gray-100 flex items-center gap-2">
        <span class="text-xs font-black text-pizarra hidden sm:inline">📍 Zona:</span>
        <select id="filtro-zona" onchange="filtrarPorZona(this.value)" class="text-xs font-bold text-pizarra bg-gray-50 border border-gray-200 rounded-lg p-1.5 outline-none cursor-pointer focus:border-lago">
          <option value="Todas">🇨🇱 Todo Chile (54 aves)</option>
          <option value="Norte">🌵 Zona Norte</option>
          <option value="Centro">🏙️ Zona Centro</option>
          <option value="Sur">🌲 Zona Sur</option>
          <option value="Centro-Sur">🐄 Zona Centro-Sur</option>
          <option value="Norte-Centro">🌊 Zona Norte-Centro</option>
          <option value="Norte-Centro-Sur">🎒 Zona Multiregional</option>
          <option value="Islas">🏝️ Territorio Insular</option>
        </select>
      </div>

      <div id="map" class="w-full h-80 sm:h-96 z-10"></div>
      
      <button id="btn-ubicacion" onclick="centrarMiUbicacion()" class="absolute bottom-5 right-5 z-[1000] bg-lago hover:bg-lago/90 text-white w-12 h-12 rounded-full shadow-lg text-xl flex items-center justify-center transition-transform active:scale-95" title="Buscar mi ubicación real">
        📍
      </button>
    </section>

    <section>
      
      <div id="tarjeta-adulto" class="tab-panel activo bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="car-container">
          <div id="car-adulto" class="w-full h-full"></div>
          
          <button onclick="carMover(-1)" class="absolute left-3 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/60 text-white w-9 h-9 rounded-full font-black text-sm">◀</button>
          <button onclick="carMover(1)" class="absolute right-3 top-1/2 -translate-y-1/2 z-20 bg-black/40 hover:bg-black/60 text-white w-9 h-9 rounded-full font-black text-sm">▶</button>
          
          <div id="car-dots-adulto" class="absolute bottom-3 left-1/2 -translate-y-1/2 z-20 flex gap-1.5"></div>
        </div>

        <div class="p-5 space-y-4">
          <div class="flex justify-between items-start border-b border-gray-100 pb-3">
            <div>
              <div class="flex items-center gap-2">
                <span id="adulto-emoji" class="text-3xl">🐦</span>
                <h2 id="adulto-nombre" class="font-black text-2xl tracking-tight text-pizarra">---</h2>
              </div>
              <p id="adulto-cientifico" class="text-sm italic text-gray-400 font-semibold mt-0.5">---</p>
            </div>
            <button id="btn-audio-a" onclick="toggleAudio()" class="bg-lago hover:bg-lago/90 text-white text-xs font-black px-4 py-2.5 rounded-xl shadow-sm transition-colors">
              🔊 Escuchar Canto
            </button>
          </div>

          <div>
            <div class="flex gap-2 border-b border-gray-100 text-xs font-black">
              <button onclick="abrirTab('habitat', this)" class="tab-btn activa border-b-2 border-lago pb-2 px-1 text-lago">Habitat y Distribución</button>
              <button onclick="abrirTab('conservacion', this)" class="tab-btn border-b-2 border-transparent pb-2 px-1 text-gray-400 hover:text-pizarra">Estado de Conservación</button>
            </div>
            
            <div id="panel-habitat" class="tab-panel activo text-sm text-pizarra/80 font-prose leading-relaxed pt-3">
              <p id="adulto-habitat">---</p>
            </div>
            <div id="panel-conservacion" class="tab-panel text-sm text-pizarra/80 font-prose leading-relaxed pt-3">
              <p id="adulto-conservacion" class="inline-block bg-coral/10 text-coral font-bold px-3 py-1 rounded-lg">---</p>
            </div>
          </div>
        </div>
      </div>

      <div id="tarjeta-nino" class="tab-panel bg-sol/30 rounded-3xl border-4 border-sol overflow-hidden">
        <div class="car-container border-b-4 border-sol">
          <div id="car-nino" class="w-full h-full"></div>
          <div id="car-dots-nino" class="absolute bottom-3 left-1/2 -translate-y-1/2 z-20 flex gap-1.5"></div>
        </div>

        <div class="p-6 text-center space-y-5">
          <div>
            <span id="nino-emoji" class="text-6xl block animate-bounce">🐦</span>
            <h2 id="nino-nombre" class="font-black text-3xl tracking-tight text-pizarra mt-2">---</h2>
          </div>

          <div class="bg-white/80 backdrop-blur-sm p-4 rounded-2xl border-2 border-sol/50 text-base font-black text-pizarra shadow-sm max-w-md mx-auto">
            <p id="nino-superpoder">---</p>
          </div>

          <button id="btn-voz-nino" onclick="toggleVoz()" class="bg-coral hover:bg-coral/90 text-white font-black px-6 py-4 rounded-2xl shadow-md text-lg transform active:scale-95 transition-all inline-flex items-center gap-2">
            🐦 ¡Háblame!
          </button>
        </div>
      </div>

    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4">
      <div class="flex justify-between items-center border-b border-gray-100 pb-2">
        <h3 class="font-black text-base text-pizarra tracking-tight">📚 Álbum de Colección</h3>
        <span id="txt-paginacion" class="text-xs font-bold text-gray-400">Página -- de --</span>
      </div>

      <div id="album-grid" class="grid grid-cols-2 sm:grid-cols-5 gap-3">
        </div>

      <div class="flex justify-between items-center pt-2">
        <button id="btn-pag-ant" onclick="cambiarPaginaAlbum(-1)" class="bg-gray-100 hover:bg-gray-200 disabled:opacity-40 disabled:hover:bg-gray-100 text-pizarra text-xs font-black px-4 py-2 rounded-xl transition-colors">
          ◀ Anterior
        </button>
        <button id="btn-pag-sig" onclick="cambiarPaginaAlbum(1)" class="bg-gray-100 hover:bg-gray-200 disabled:opacity-40 disabled:hover:bg-gray-100 text-pizarra text-xs font-black px-4 py-2 rounded-xl transition-colors">
          Siguiente ▶
        </button>
      </div>
    </section>

  </main>

  <footer class="bg-pizarra text-white/40 text-center text-xs py-4 border-t border-white/5 font-semibold mt-8">
    Alas de Chile &copy; 2026 &bull; Conectado a iNaturalist API
  </footer>

  <script src="app.js"></script>
</body>
</html>
